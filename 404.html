<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة | روائع التصميم للديكور</title>
<meta name="theme-color" content="#16213A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Tajawal",system-ui,sans-serif;
    background:#0E1626;color:#F2ECE0;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
    background-image:radial-gradient(circle at 50% 20%,rgba(199,163,90,.16),transparent 55%);
  }
  .wrap{max-width:520px}
  .code{
    font-family:"El Messiri",sans-serif;font-weight:700;
    font-size:clamp(5rem,18vw,9rem);line-height:1;
    background:linear-gradient(120deg,#D8BC82,#A6823C);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  h1{font-family:"El Messiri",sans-serif;font-size:1.7rem;margin:14px 0 12px;color:#F2ECE0}
  p{color:rgba(242,236,224,.75);margin-bottom:30px;line-height:1.8}
  a.btn{
    display:inline-flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,#C7A35A,#A6823C);color:#0E1626;
    font-family:"El Messiri",sans-serif;font-weight:700;
    padding:14px 30px;border-radius:50px;text-decoration:none;
    box-shadow:0 12px 30px rgba(166,130,60,.35);transition:transform .25s;
  }
  a.btn:hover{transform:translateY(-3px)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>عذرًا، الصفحة غير موجودة</h1>
    <p>يبدو أن الرابط الذي طلبته غير متاح. عُد إلى الصفحة الرئيسية لاستكشاف أعمالنا وخدماتنا في الديكور الداخلي الفاخر.</p>
    <a class="btn" href="index.html">العودة للرئيسية</a>
  </div>
</body>
</html>
